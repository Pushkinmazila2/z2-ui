services:
  zapret2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zapret2
    restart: unless-stopped

    # Минимально необходимые capabilities для iptables внутри контейнера.
    # Хостовая сеть НЕ используется — bridge по умолчанию.
    cap_add:
      - NET_ADMIN
      - NET_RAW

    sysctls:
      # Нужно для conntrack внутри контейнера
      net.netfilter.nf_conntrack_max: 262144

    ports:
      - "1080:1080"   # SOCKS5

    environment:
      # Уровень логов: info | debug
      LOG_LEVEL: info

      # Номер NFQUEUE (менять не нужно если нет конфликтов)
      NFQUEUE_NUM: 200

      # Путь к пользовательскому конфигу (монтируется через volume)
      ZAPRET_CONFIG: /opt/zapret2/config

      # Раскомментировать для кастомной стратегии:
      # NFQWS2_ENABLE: "1"
      # NFQWS2_OPT: "--filter-tcp=443 --filter-l7=tls --lua-desync=fake:blob=fake_default_tls:tcp_md5"

    volumes:
      # Пользовательский конфиг (опционально)
      # - ./config:/opt/zapret2/config:ro

      # Кастомные хостлисты (опционально)
      # - ./lists:/opt/zapret2/lists:ro

    # Изолируем от хоста: своя сеть bridge, не host
    networks:
      - zapret2_net

networks:
  zapret2_net:
    driver: bridge