version: '3.8'

services:
  zapret2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zapret2-proxy
    restart: unless-stopped
    
    # Required capabilities for iptables and network manipulation
    cap_add:
      - NET_ADMIN
      - NET_RAW
    
    # System controls for IP forwarding
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.route_localnet=1
    
    # Network mode
    network_mode: bridge
    
    ports:
      - "1080:1080"  # SOCKS5 port
    
    environment:
      # SOCKS5 configuration
      - SOCKS5_PORT=1080
      # - SOCKS5_USER=username  # Optional authentication
      # - SOCKS5_PASS=password  # Optional authentication
      
      # NFQUEUE configuration
      - NFQUEUE_NUM=200
      
      # zapret2 configuration
      - NFQWS2_ENABLE=1
      - DISABLE_IPV6=1
      
      # Custom zapret config path (optional)
      # - ZAPRET_CONFIG=/opt/zapret2/config
    
    volumes:
      # Mount custom config (optional)
      # - ./config:/opt/zapret2/config:ro
      
      # Mount custom hostlists (optional)
      - ./lists:/opt/zapret2/lists:ro
      
      # Mount custom lua scripts (optional)
      # - ./custom-lua:/opt/zapret2/custom-lua:ro
      
      # Logs
      - ./logs:/var/log/zapret2
    
    # Healthcheck
    healthcheck:
      test: ["CMD", "nc -z 127.0.0.1 1080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    driver: bridge